<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="face-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#0f0e2a"/>

  <!-- Gradient overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" opacity="0.85"/>

  <!-- Face circle -->
  <circle cx="512" cy="460" r="250" fill="none" stroke="white" stroke-width="28" opacity="0.95"/>

  <!-- Left eye -->
  <circle cx="420" cy="410" r="28" fill="white" opacity="0.95"/>

  <!-- Right eye -->
  <circle cx="604" cy="410" r="28" fill="white" opacity="0.95"/>

  <!-- Smile -->
  <path d="M 420 500 Q 512 580 604 500" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.95"/>

  <!-- Score badge -->
  <circle cx="700" cy="680" r="100" fill="#0f0e2a" opacity="0.7"/>
  <circle cx="700" cy="680" r="85" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>

  <!-- Score text -->
  <text x="700" y="698" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">9.5</text>
</svg>
